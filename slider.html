<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" />
    <link rel="stylesheet" href="slider.css" />
    <title>Vertical Slider</title>
  </head>
  <body>
    <div class="slider-container">
      <div class="left-slide">
        <div style="background-color: #6965e7">
          <h1>Artificial Intelligence</h1>
          <p>future will be AI</p>
        
        </div>
        <div style="background-color: #2A86BA">
          <h1>Machine Learning</h1>
          <p>machines are trainded by human</p>
        </div>
        <div style="background-color: #dc9fc7">
          <h1>UI/UX</h1>
          <p>user interface& user Experience</p>
        </div>
        <div style="background-color: #4d0005">
          <h1>Programming language</h1>
          <p>html,css,javascript</p>
        </div>
      </div>
      <div class="right-slide">
        <div style="background-image: url('https://th.bing.com/th/id/OIP.qgPVKxzcsG1Ifw0rUiSBqgHaEw?w=259&h=180&c=7&r=0&o=5&dpr=1.3&pid=1.7')"></div>
        <div style="background-image: url('https://th.bing.com/th/id/OIP.aS3DRoXloWAp2Oil_GH6pgHaEK?w=297&h=180&c=7&r=0&o=5&dpr=1.3&pid=1.7')"></div>
        <div style="background-image: url('https://th.bing.com/th/id/OIP.DeT1NAbF9OKVbQdXyYw5DQHaEy?w=234&h=180&c=7&r=0&o=5&dpr=1.3&pid=1.7')"></div>
        <div style="background-image: url('https://th.bing.com/th/id/OIP.8DJEPdKdWUj26kdAH-7vRwHaEK?w=282&h=180&c=7&r=0&o=5&dpr=1.3&pid=1.7')"></div>
      </div>
      <div class="action-buttons">
        <button class="down-button">
          <i class="fas fa-arrow-down"></i>
        </button>
        <button class="up-button">
          <i class="fas fa-arrow-up"></i>
        </button>
      </div>
    </div>

    <script src="slider.js"></script>
  </body>
</html>
